<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Schedule Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f6f6f0;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0.9rem 1.5rem;
      text-align: center;
    }

    header h1 { font-size: 1.2rem; font-weight: bold; letter-spacing: 0.02em; }
    header .admin-badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #b03030;
      font-family: monospace;
      margin-left: 0.5rem;
    }

    .container { max-width: 740px; margin: 0 auto; padding: 0 1.2rem; }

    .screen { display: none; }
    .screen.active { display: block; }

    button {
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: Georgia, serif;
    }

    .btn-primary   { background: #2a6496; color: #fff; }
    .btn-primary:hover   { background: #1e4d73; }
    .btn-secondary { background: #e0e0e0; color: #444; }
    .btn-secondary:hover { background: #ccc; }
    .btn-save      { background: #c07000; color: #fff; }
    .btn-save:hover      { background: #9a5900; }
    button:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: Georgia, serif;
      outline: none;
      margin-bottom: 0.8rem;
    }

    input[type="text"]:focus, input[type="password"]:focus { border-color: #2a6496; }

    /* ── Login ── */

    #screen-login .container {
      display: flex;
      justify-content: center;
      padding-top: 5rem;
    }

    .login-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 340px;
    }

    .login-card h2 { font-size: 1.1rem; margin-bottom: 1.4rem; color: #444; }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 0.6rem 0.8rem;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    /* ── Calendar ── */

    #screen-calendar .container { padding-top: 1.5rem; padding-bottom: 3rem; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .cal-header h2 { font-size: 1.3rem; }

    .cal-nav { display: flex; align-items: center; gap: 0.5rem; }

    .cal-nav button {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
    }

    .cal-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .dirty-notice {
      font-size: 0.8rem;
      color: #c07000;
      font-family: monospace;
    }

    .save-notice {
      font-size: 0.8rem;
      color: #555;
      font-family: monospace;
      background: #fffbe6;
      border: 1px solid #e8d88a;
      border-radius: 4px;
      padding: 0.5rem 0.8rem;
      margin-bottom: 1rem;
    }

    .weekday-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .weekday-labels span {
      text-align: center;
      font-size: 0.75rem;
      color: #888;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.4rem;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-cell:hover { border-color: #2a6496; background: #f0f5fb; }
    .day-cell.empty { border: none; background: transparent; cursor: default; pointer-events: none; }
    .day-cell.dirty { border-color: #c07000; }
    .day-cell.dirty::after {
      content: '●';
      position: absolute;
      top: 3px;
      right: 5px;
      font-size: 0.45rem;
      color: #c07000;
    }

    .day-num { font-size: 1rem; font-weight: bold; }

    /* ── Day Editor ── */

    #screen-editor .container { padding-top: 1.5rem; padding-bottom: 3rem; }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
    }

    .editor-header h2 { font-size: 1.2rem; }

    .slot-list { list-style: none; }

    .slot-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
    }

    .slot-num {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      font-family: monospace;
      margin-bottom: 0.25rem;
    }

    .slot-current {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .slot-current img {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .slot-alts {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .alt-btn {
      font-size: 0.8rem;
      padding: 0.35rem 0.7rem;
      background: #f0f5fb;
      color: #2a6496;
      border: 1px solid #c0d8ef;
      border-radius: 4px;
      cursor: pointer;
      font-family: Georgia, serif;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s;
    }

    .alt-btn:hover { background: #d8eaf8; border-color: #2a6496; }

    .alt-btn.l3 { background: #f0faf2; color: #276b3a; border-color: #a8d8b0; }
    .alt-btn.l3:hover { background: #d0f0d8; border-color: #276b3a; }
    .alt-btn.l4 { background: #fff8f0; color: #a05000; border-color: #e8c090; }
    .alt-btn.l4:hover { background: #ffe8c8; border-color: #a05000; }

    .level-badge {
      font-size: 0.65rem;
      font-family: monospace;
      font-weight: bold;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .level-badge.l3 { background: #d0f0d8; color: #276b3a; }
    .level-badge.l4 { background: #ffe8c8; color: #a05000; }

    .refreshing { color: #aaa; font-size: 0.85rem; font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>RiccFish <span class="admin-badge">Admin</span></h1>
</header>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="container">
    <div class="login-card">
      <h2>Schedule Editor Login</h2>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <input type="text"     id="login-user" placeholder="Username" autocomplete="username">
      <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
      <button class="btn-primary" id="btn-login" style="width:100%" onclick="doLogin()">Log in</button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div id="screen-calendar" class="screen">
  <div class="container">
    <div class="cal-header">
      <div class="cal-nav">
        <button class="btn-secondary" id="btn-prev" onclick="changeMonth(-1)">← Prev</button>
        <h2 id="cal-title"></h2>
        <button class="btn-secondary" id="btn-next" onclick="changeMonth(1)">Next →</button>
      </div>
      <button class="btn-save" id="btn-save-cal" onclick="saveSchedule()" style="display:none">Save ↓</button>
    </div>
    <div id="save-notice" class="save-notice" style="display:none"></div>
    <div class="weekday-labels">
      <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
    </div>
    <div id="days-grid" class="days-grid"></div>
  </div>
</div>

<!-- EDITOR -->
<div id="screen-editor" class="screen">
  <div class="container">
    <div class="editor-header">
      <button class="btn-secondary" onclick="showCalendar()">← Back</button>
      <h2 id="editor-title"></h2>
      <button class="btn-save" id="btn-save-ed" onclick="saveSchedule()">Save ↓</button>
    </div>
    <ul id="slot-list" class="slot-list"></ul>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────

  const AVAILABLE_MONTHS = [
    { year: 2026, month: 3,  label: 'March 2026',     file: 'march_2026_schedule.json'     },
    { year: 2026, month: 4,  label: 'April 2026',     file: 'april_2026_schedule.json'     },
    { year: 2026, month: 5,  label: 'May 2026',       file: 'may_2026_schedule.json'       },
    { year: 2026, month: 6,  label: 'June 2026',      file: 'june_2026_schedule.json'      },
    { year: 2026, month: 7,  label: 'July 2026',      file: 'july_2026_schedule.json'      },
    { year: 2026, month: 8,  label: 'August 2026',    file: 'august_2026_schedule.json'    },
    { year: 2026, month: 9,  label: 'September 2026', file: 'september_2026_schedule.json' },
    { year: 2026, month: 10, label: 'October 2026',   file: 'october_2026_schedule.json'   },
    { year: 2026, month: 11, label: 'November 2026',  file: 'november_2026_schedule.json'  },
    { year: 2026, month: 12, label: 'December 2026',  file: 'december_2026_schedule.json'  },
  ];

  // ── State ──────────────────────────────────────────────────────────────────

  let articlesPool    = [];
  let articlesByTitle = {};
  let schedules       = {};    // file → { "1": [...], ... }
  let dirtyMonths     = new Set();
  let monthIndex      = 0;
  let editingDay      = null;

  // ── Helpers ────────────────────────────────────────────────────────────────

  function currentMeta()   { return AVAILABLE_MONTHS[monthIndex]; }
  function currentFile()   { return currentMeta().file; }
  function currentSchedule() { return schedules[currentFile()]; }

  function monthLabel(m) {
    return ['January','February','March','April','May','June',
            'July','August','September','October','November','December'][m - 1];
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Login ──────────────────────────────────────────────────────────────────

  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    let loginOk = false;
    try {
      const resp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }),
      });
      loginOk = resp.ok;
    } catch (e) {
      errEl.textContent = 'Could not reach server: ' + e.message;
      errEl.style.display = '';
      return;
    }

    if (!loginOk) {
      errEl.textContent = 'Invalid credentials.';
      errEl.style.display = '';
      return;
    }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const [l3Resp, l4Resp] = await Promise.all([
        fetch('data/vital_l3.json'),
        fetch('data/vital_l4.json'),
      ]);
      if (!l3Resp.ok) throw new Error(`vital_l3.json HTTP ${l3Resp.status}`);
      if (!l4Resp.ok) throw new Error(`vital_l4.json HTTP ${l4Resp.status}`);
      const filter = a => !/^lists? of\b/i.test(a.title);
      articlesPool = [...(await l3Resp.json()), ...(await l4Resp.json())].filter(filter);
      articlesByTitle = Object.fromEntries(articlesPool.map(a => [a.title, a]));
    } catch (e) {
      errEl.textContent = 'Failed to load articles: ' + e.message;
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Log in';
      return;
    }

    // Default to the month matching today if available
    const now = new Date();
    const todayIdx = AVAILABLE_MONTHS.findIndex(m => m.year === now.getFullYear() && m.month === now.getMonth() + 1);
    monthIndex = todayIdx >= 0 ? todayIdx : 0;

    await loadMonthSchedule(monthIndex);
    showCalendar();
  }

  async function loadMonthSchedule(idx, bustCache = false) {
    const meta = AVAILABLE_MONTHS[idx];
    if (schedules[meta.file] && !bustCache) return;
    const url = `data/schedule/${meta.file}?t=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    schedules[meta.file] = await resp.json();
  }

  // ── Calendar ───────────────────────────────────────────────────────────────

  function showCalendar() {
    editingDay = null;
    renderCalendar();
    showScreen('screen-calendar');
  }

  function renderCalendar() {
    const meta = currentMeta();
    document.getElementById('cal-title').textContent = meta.label;
    document.getElementById('btn-prev').disabled = monthIndex === 0;
    document.getElementById('btn-next').disabled = monthIndex === AVAILABLE_MONTHS.length - 1;

    const isDirty = dirtyMonths.has(currentFile());
    const saveBtn = document.getElementById('btn-save-cal');
    saveBtn.style.display = isDirty ? '' : 'none';
    saveBtn.textContent = `Save ${meta.label} ↓`;

    document.getElementById('save-notice').style.display = 'none';

    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const daysInMonth = new Date(meta.year, meta.month, 0).getDate();
    // Monday-first: getDay() returns 0=Sun..6=Sat → map to 0=Mon..6=Sun
    const firstDow = (new Date(meta.year, meta.month - 1, 1).getDay() + 6) % 7;

    for (let i = 0; i < firstDow; i++) {
      const blank = document.createElement('div');
      blank.className = 'day-cell empty';
      grid.appendChild(blank);
    }

    const sched = currentSchedule();
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (sched && dirtyDays && dirtyDays.has(`${currentFile()}_${d}`)) {
        cell.classList.add('dirty');
      }
      cell.innerHTML = `<span class="day-num">${d}</span>`;
      cell.onclick = () => openEditor(d);
      grid.appendChild(cell);
    }
  }

  // Track which (file, day) combos have been modified for the dot indicator
  const dirtyDays = new Set();

  async function changeMonth(dir) {
    monthIndex += dir;
    try {
      await loadMonthSchedule(monthIndex);
    } catch (e) {
      alert(`Could not load schedule for ${AVAILABLE_MONTHS[monthIndex].label}: ${e.message}`);
      monthIndex -= dir;
      return;
    }
    renderCalendar();
  }

  // ── Day Editor ─────────────────────────────────────────────────────────────

  function openEditor(day) {
    editingDay = day;
    const meta = currentMeta();
    document.getElementById('editor-title').textContent = `${meta.label} — Day ${day}`;

    const isDirty = dirtyMonths.has(currentFile());
    const saveBtn = document.getElementById('btn-save-ed');
    saveBtn.textContent = `Save ${meta.label} ↓`;
    saveBtn.style.visibility = isDirty ? 'visible' : 'hidden';

    renderSlots();
    showScreen('screen-editor');
  }

  function getDayTitles() {
    return currentSchedule()[String(editingDay)] || [];
  }

  function pickAlternatives(slotIndex) {
    const current = getDayTitles();
    const excluded = new Set(current);
    const candidates = articlesPool.filter(a => !excluded.has(a.title));
    // Fisher-Yates sample of 3
    const alts = [];
    const pool = candidates.slice();
    for (let i = 0; i < 3 && pool.length > 0; i++) {
      const j = Math.floor(Math.random() * (pool.length - i)) + i;
      [pool[i], pool[j]] = [pool[j], pool[i]];
      alts.push(pool[i].title);
    }
    return alts;
  }

  function renderSlots() {
    const titles = getDayTitles();
    const list = document.getElementById('slot-list');
    list.innerHTML = '';

    titles.forEach((title, i) => {
      const alts = pickAlternatives(i);
      list.appendChild(buildSlotEl(i, title, alts));
    });
  }

  function buildSlotEl(slotIndex, title, alts) {
    const li = document.createElement('li');
    li.className = 'slot-item';
    li.id = `slot-${slotIndex}`;

    const art = articlesByTitle[title];
    const level = art?.vital_level;
    const badgeHtml = level
      ? `<span class="level-badge l${level}">L${level}</span>`
      : '';

    li.innerHTML = `
      <div class="slot-num">Article ${slotIndex + 1}</div>
      <div class="slot-current">${badgeHtml}<span>${escapeHtml(title)}</span></div>
      <div class="slot-alts"></div>
    `;

    const altsDiv = li.querySelector('.slot-alts');
    alts.forEach(t => {
      const altArt = articlesByTitle[t];
      const altLevel = altArt?.vital_level;
      const btn = document.createElement('button');
      btn.className = `alt-btn${altLevel ? ' l' + altLevel : ''}`;
      btn.title = t;
      btn.textContent = t;
      btn.addEventListener('click', () => swapArticle(slotIndex, t));
      altsDiv.appendChild(btn);
    });

    return li;
  }

  function swapArticle(slotIndex, newTitle) {
    const sched = currentSchedule();
    const dayKey = String(editingDay);
    sched[dayKey][slotIndex] = newTitle;

    dirtyMonths.add(currentFile());
    dirtyDays.add(`${currentFile()}_${editingDay}`);

    // Update save button visibility
    document.getElementById('btn-save-ed').style.visibility = 'visible';

    // Re-render just this slot
    const alts = pickAlternatives(slotIndex);
    const existing = document.getElementById(`slot-${slotIndex}`);
    if (existing) existing.replaceWith(buildSlotEl(slotIndex, newTitle, alts));
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Save ───────────────────────────────────────────────────────────────────

  async function saveSchedule() {
    const meta = currentMeta();
    const saveButtons = [
      document.getElementById('btn-save-cal'),
      document.getElementById('btn-save-ed'),
    ];
    saveButtons.forEach(b => { b.disabled = true; b.textContent = 'Saving…'; });

    try {
      const resp = await fetch('/save-schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file: meta.file, data: currentSchedule() }),
      });
      if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    } catch (e) {
      alert('Save failed: ' + e.message);
      saveButtons.forEach(b => { b.disabled = false; b.textContent = `Save ${meta.label} ↓`; });
      return;
    }

    dirtyMonths.delete(currentFile());
    renderCalendar();

    saveButtons.forEach(b => {
      b.disabled = false;
      b.textContent = `Save ${meta.label} ↓`;
    });
  }
</script>
</body>
</html>
